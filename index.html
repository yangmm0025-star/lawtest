<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法考备考 · 题库 · 模拟 · 错题本</title>
<style>/* ============ Reset & Base ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: #f0f2f5;
  color: #1a2332;
  min-height: 100vh;
  display: flex;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }
:root {
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --primary-light: #eff6ff;
  --success: #059669;
  --success-bg: #ecfdf5;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --warning: #d97706;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --sidebar-w: 240px;
  --nav-h: 0px;
  --radius: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -1px rgba(0,0,0,.04);
}

/* ============ Sidebar ============ */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: #fff;
  border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform .25s ease;
}
.sidebar-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--gray-100);
}
.sidebar-brand h1 {
  font-size: 1.25rem; font-weight: 700;
  color: var(--primary);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-brand h1 span { font-size: 1.5rem; }
.sidebar-brand p {
  font-size: .75rem; color: var(--gray-400);
  margin-top: 2px; letter-spacing: 1px;
}
.sidebar-nav {
  flex: 1; padding: 12px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px; border-radius: var(--radius);
  font-size: .9rem; font-weight: 500; color: var(--gray-600);
  transition: all .15s ease;
}
.nav-item:hover { background: var(--gray-100); color: var(--gray-800); }
.nav-item.active {
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}
.nav-item .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }
.nav-item .badge {
  margin-left: auto;
  background: var(--danger); color: #fff;
  font-size: .7rem; font-weight: 600;
  padding: 1px 7px; border-radius: 10px;
  min-width: 18px; text-align: center;
}
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--gray-100);
  font-size: .75rem; color: var(--gray-400);
}
.progress-mini { margin-bottom: 8px; }
.progress-mini .label { display: flex; justify-content: space-between; margin-bottom: 4px; }
.progress-mini .bar {
  height: 4px; background: var(--gray-200); border-radius: 2px; overflow: hidden;
}
.progress-mini .bar-fill {
  height: 100%; background: var(--primary); border-radius: 2px;
  transition: width .3s ease;
}
/* sidebar toggle (mobile) */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 99; }

/* ============ Main ============ */
.main {
  margin-left: var(--sidebar-w);
  flex: 1; min-height: 100vh;
  padding: 28px 32px;
  max-width: 100%;
}
.section { display: none; }
.section.active { display: block; }
.section-title {
  font-size: 1.5rem; font-weight: 700; color: var(--gray-800);
  margin-bottom: 4px;
}
.section-subtitle {
  font-size: .85rem; color: var(--gray-500);
  margin-bottom: 24px;
}

/* ============ Question Bank ============ */
.subject-tabs {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.subject-tab {
  padding: 6px 16px; border-radius: 20px;
  font-size: .8rem; font-weight: 500;
  color: var(--gray-500); background: var(--gray-100);
  transition: all .15s;
  border: 1px solid transparent;
}
.subject-tab:hover { color: var(--gray-700); background: var(--gray-200); }
.subject-tab.active {
  color: var(--primary); background: var(--primary-light);
  border-color: var(--primary);
}
.question-counter {
  font-size: .85rem; color: var(--gray-500);
  margin-bottom: 16px;
}
.question-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px;
  margin-bottom: 20px;
}
.question-subject {
  display: inline-block;
  font-size: .75rem; font-weight: 600;
  color: var(--primary);
  background: var(--primary-light);
  padding: 2px 10px; border-radius: 4px;
  margin-bottom: 12px;
}
.question-text {
  font-size: 1.05rem; line-height: 1.7;
  color: var(--gray-800);
  margin-bottom: 20px;
}
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  display: flex; align-items: flex-start;
  gap: 10px; padding: 12px 16px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s ease;
  font-size: .95rem; line-height: 1.5;
}
.option:hover { border-color: var(--primary); background: #fafcff; }
.option .opt-letter {
  width: 24px; height: 24px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--gray-100);
  font-size: .8rem; font-weight: 600; color: var(--gray-500);
  transition: all .15s;
}
.option.selected { border-color: var(--primary); background: var(--primary-light); }
.option.selected .opt-letter { background: var(--primary); color: #fff; }
.option.correct {
  border-color: var(--success);
  background: var(--success-bg);
}
.option.correct .opt-letter { background: var(--success); color: #fff; }
.option.wrong {
  border-color: var(--danger);
  background: var(--danger-bg);
}
.option.wrong .opt-letter { background: var(--danger); color: #fff; }
.option.disabled { cursor: default; opacity: .85; }

.feedback-box {
  margin-top: 16px; padding: 14px 18px;
  border-radius: var(--radius);
  font-size: .9rem; line-height: 1.6;
}
.feedback-box.correct { background: var(--success-bg); color: #065f46; border-left: 3px solid var(--success); }
.feedback-box.wrong { background: var(--danger-bg); color: #991b1b; border-left: 3px solid var(--danger); }
.feedback-box .exp-label { font-weight: 600; margin-bottom: 4px; }
.feedback-box .exp-text { color: var(--gray-600); }

.question-nav {
  display: flex; gap: 12px; justify-content: space-between; align-items: center;
}
.question-nav .btn-group { display: flex; gap: 8px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px; border-radius: var(--radius);
  font-size: .85rem; font-weight: 600;
  transition: all .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline {
  background: transparent; color: var(--gray-600);
  border: 1px solid var(--gray-300);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-outline:disabled { opacity: .4; cursor: not-allowed; }
.btn-sm { padding: 6px 14px; font-size: .8rem; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #047857; }
.btn-danger-outline { border: 1px solid var(--danger); color: var(--danger); }
.btn-danger-outline:hover { background: var(--danger-bg); }
.question-index-dots {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin: 16px 0;
}
.q-dot {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 600;
  background: var(--gray-100); color: var(--gray-500);
  cursor: pointer; border: 1px solid transparent;
  transition: all .12s;
}
.q-dot:hover { border-color: var(--primary); }
.q-dot.current { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.q-dot.answered { background: var(--primary); color: #fff; }
.q-dot.wrong-dot { background: var(--danger); color: #fff; }

/* ============ Videos ============ */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.video-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .2s;
}
.video-card:hover { box-shadow: var(--shadow-md); }
.video-card-thumb {
  width: 100%; aspect-ratio: 16/9;
  background: var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; color: var(--gray-400);
  position: relative;
}
.video-card-thumb .play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.3);
  opacity: 0; transition: opacity .2s;
}
.video-card:hover .play-overlay { opacity: 1; }
.video-card-thumb .play-icon {
  width: 50px; height: 50px; border-radius: 50%;
  background: rgba(255,255,255,.9);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.video-card-body { padding: 16px 18px 18px; }
.video-card-body h3 {
  font-size: .9rem; font-weight: 600; color: var(--gray-800);
  margin-bottom: 4px; line-height: 1.4;
}
.video-card-body .meta {
  font-size: .78rem; color: var(--gray-400);
  display: flex; gap: 12px;
}
.video-card-body .desc {
  font-size: .82rem; color: var(--gray-500);
  margin-top: 8px; line-height: 1.5;
}

/* ============ Mock Exam ============ */
.exam-start {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 40px; text-align: center;
  max-width: 560px; margin: 40px auto;
}
.exam-start h2 { font-size: 1.4rem; margin-bottom: 8px; }
.exam-start p { color: var(--gray-500); margin-bottom: 6px; font-size: .9rem; }
.exam-start .rules {
  text-align: left; display: inline-block;
  margin: 20px 0 24px; padding: 16px 20px;
  background: var(--gray-50); border-radius: var(--radius);
}
.exam-start .rules li {
  list-style: none; padding: 4px 0;
  font-size: .85rem; color: var(--gray-600);
  display: flex; align-items: center; gap: 8px;
}
.exam-start .rules li::before { content: "•"; color: var(--primary); font-weight: bold; }

/* exam active */
.exam-header {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; padding: 12px 20px;
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
  margin-bottom: 16px;
}
.exam-timer {
  font-size: 1.1rem; font-weight: 700; color: var(--gray-700);
  display: flex; align-items: center; gap: 6px;
}
.exam-timer.warning { color: var(--warning); }
.exam-timer.danger { color: var(--danger); }
.exam-progress-text { font-size: .85rem; color: var(--gray-500); }
.exam-body {
  display: grid; grid-template-columns: 1fr 180px; gap: 20px;
}
.exam-main .question-card { margin-bottom: 0; }
.exam-palette {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px; height: fit-content; position: sticky; top: 20px;
}
.exam-palette h4 { font-size: .8rem; color: var(--gray-500); margin-bottom: 10px; }
.palette-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.palette-dot {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 600;
  background: var(--gray-100); color: var(--gray-500);
  cursor: pointer; border: 1px solid transparent;
  transition: all .12s;
}
.palette-dot:hover { border-color: var(--primary); }
.palette-dot.current { border-color: var(--primary); color: var(--primary); }
.palette-dot.answered { background: var(--primary); color: #fff; }

.exam-actions {
  display: flex; justify-content: space-between;
  margin-top: 16px;
}

/* exam results */
.exam-result {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px; text-align: center;
  max-width: 560px; margin: 0 auto;
}
.exam-result .score-circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 6px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
  margin: 16px auto;
  font-size: 2.4rem; font-weight: 700; color: var(--primary);
}
.exam-result .score-circle.pass { border-color: var(--success); color: var(--success); }
.exam-result .score-circle.fail { border-color: var(--danger); color: var(--danger); }
.exam-result .detail-row {
  display: flex; justify-content: center; gap: 32px; margin: 16px 0 20px;
}
.exam-result .detail-item { text-align: center; }
.exam-result .detail-item .num { font-size: 1.3rem; font-weight: 700; color: var(--gray-800); }
.exam-result .detail-item .lbl { font-size: .78rem; color: var(--gray-500); }

/* ============ Wrong Answers ============ */
.wrong-list { display: flex; flex-direction: column; gap: 16px; }
.wrong-item {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  border-left: 3px solid var(--danger);
}
.wrong-item .wi-subject {
  font-size: .75rem; font-weight: 600; color: var(--gray-500);
  margin-bottom: 8px;
}
.wrong-item .wi-question { font-size: .95rem; margin-bottom: 12px; line-height: 1.6; }
.wrong-item .wi-answers { display: flex; gap: 20px; font-size: .85rem; }
.wrong-item .wi-answers .wrong-ans { color: var(--danger); }
.wrong-item .wi-answers .right-ans { color: var(--success); }
.wrong-item .wi-explain {
  margin-top: 10px; padding: 10px 12px;
  background: var(--gray-50); border-radius: 6px;
  font-size: .82rem; color: var(--gray-600); line-height: 1.5;
}
.wrong-empty {
  text-align: center; padding: 60px 20px;
  color: var(--gray-400);
}
.wrong-empty .big-icon { font-size: 3rem; margin-bottom: 12px; }
.wrong-empty p { font-size: .9rem; }

/* ============ Responsive ============ */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; padding: 16px; }
  .exam-body { grid-template-columns: 1fr; }
  .exam-palette { position: static; }
  .video-grid { grid-template-columns: 1fr; }
  .exam-start { padding: 24px; margin: 20px auto; }
  .question-nav { flex-direction: column; gap: 8px; }
  .question-nav .btn-group { width: 100%; }
  .question-nav .btn-group .btn { flex: 1; justify-content: center; }
}

.mobile-menu-btn {
  display: none;
  position: fixed; top: 12px; right: 12px; z-index: 50;
  width: 40px; height: 40px; border-radius: var(--radius);
  background: #fff; box-shadow: var(--shadow);
  align-items: center; justify-content: center;
  font-size: 1.3rem;
}
@media (max-width: 768px) {
  .mobile-menu-btn { display: flex; }
}

/* ============ Animations ============ */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.section.active > * { animation: fadeIn .25s ease; }

/* ============ Wrong Answers Enhanced ============ */
.wrong-summary {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
}
.wrong-summary h3 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: 16px;
}
.summary-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.summary-card {
  background: var(--gray-50);
  border-radius: 6px;
  padding: 14px 16px;
  border-left: 3px solid var(--gray-300);
}
.summary-card:first-of-type { border-left-color: var(--danger); }
.summary-card:nth-of-type(2) { border-left-color: var(--warning); }
.summary-card:nth-of-type(3) { border-left-color: var(--primary); }
.tip-card { border-left-color: var(--primary) !important; }
.sc-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.sc-code {
  font-size: .88rem;
  font-weight: 700;
  color: var(--gray-800);
}
.sc-count {
  font-size: .75rem;
  font-weight: 600;
  color: var(--gray-500);
  background: var(--gray-200);
  padding: 2px 10px;
  border-radius: 12px;
}
.sc-topics {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.topic-tag {
  display: inline-block;
  font-size: .75rem;
  font-weight: 500;
  color: var(--primary);
  background: var(--primary-light);
  padding: 3px 10px;
  border-radius: 4px;
}
.wrong-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.wrong-filter {
  padding: 5px 14px;
  border-radius: 16px;
  font-size: .78rem;
  font-weight: 500;
  color: var(--gray-500);
  background: var(--gray-100);
  border: 1px solid transparent;
  transition: all .15s;
  cursor: pointer;
}
.wrong-filter:hover { color: var(--gray-700); background: var(--gray-200); }
.wrong-filter.active {
  color: var(--primary);
  background: var(--primary-light);
  border-color: var(--primary);
}

.wrong-item .wi-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.wrong-item .wi-code {
  font-size: .72rem;
  font-weight: 700;
  color: #fff;
  background: var(--primary);
  padding: 2px 10px;
  border-radius: 4px;
}
.wrong-item .wi-topic {
  font-size: .72rem;
  font-weight: 600;
  color: var(--gray-600);
  background: var(--gray-100);
  padding: 2px 10px;
  border-radius: 4px;
}
.wrong-item .wi-subject {
  font-size: .72rem;
  color: var(--gray-400);
}
</style>

<body>

<!-- Mobile menu button -->
<div class="mobile-menu-btn" id="menu-btn">☰</div>

<!-- Sidebar overlay for mobile -->
<div class="sidebar-overlay"></div>

<!-- ============ Sidebar ============ -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <h1><span>⚖️</span> 法考备考</h1>
    <p>题库 · 视频 · 模拟</p>
  </div>
  <nav class="sidebar-nav">
    <a href="#" class="nav-item active" data-section="bank">
      <span class="nav-icon">📖</span> 题库
    </a>
    <a href="#" class="nav-item" data-section="videos">
      <span class="nav-icon">🎬</span> 讲解视频
    </a>
    <a href="#" class="nav-item" data-section="exam">
      <span class="nav-icon">📝</span> 模拟考试
    </a>
    <a href="#" class="nav-item" data-section="wrong">
      <span class="nav-icon">📕</span> 错题本
      <span class="badge" id="wrong-badge" style="display:none;">0</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="progress-mini">
      <div class="label">
        <span>刷题进度</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="bar"><div class="bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div style="margin-top:6px;text-align:right;" id="progress-label">0 / 47</div>
    </div>
  </div>
</aside>

<!-- ============ Main ============ -->
<main class="main">

  <!-- ===== Section: 题库 ===== -->
  <div class="section active" id="section-bank">
    <h2 class="section-title">📖 题库练习</h2>
    <p class="section-subtitle">按科目刷题，每道题都配有详细解析</p>
    <div class="subject-tabs">
      <button class="subject-tab active" data-subject="all">全部</button>
      <button class="subject-tab" data-subject="民法">民法</button>
      <button class="subject-tab" data-subject="刑法">刑法</button>
      <button class="subject-tab" data-subject="行政法">行政法</button>
      <button class="subject-tab" data-subject="民事诉讼法">民诉法</button>
      <button class="subject-tab" data-subject="刑事诉讼法">刑诉法</button>
      <button class="subject-tab" data-subject="商法">商法</button>
      <button class="subject-tab" data-subject="宪法">宪法</button>
    </div>
    <div class="question-counter" id="qbank-counter">第 1 / 47 题</div>
    <div id="qbank-dots" class="question-index-dots"></div>
    <div id="qbank-container"><div id="qbank-question"></div></div>

<script>// ============ State ============
const state = {
  currentSection: "bank",
  currentSubject: "all",
  currentQuestionIdx: 0,
  answeredQuestions: {},    // { qId: selectedIdx }
  wrongAnswers: [],          // array from localStorage
  examState: null,           // null or { questions:[], answers:{}, currentIdx, timeLeft, timerId, finished }
};

// ============ Init ============
function init() {
  loadWrongAnswers();
  initNavigation();
  initSubjectTabs();
  showSection("bank");
  updateProgress();
  updateWrongBadge();
  // renderQuestionBank(); (called from showSection)
}

// ============ Navigation ============
function initNavigation() {
  document.querySelectorAll(".nav-item").forEach(el => {
    el.addEventListener("click", e => {
      e.preventDefault();
      const section = el.dataset.section;
      showSection(section);
      document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
      el.classList.add("active");
      if (window.innerWidth <= 768) {
        toggleSidebar(false);
      }
    });
  });
}

function showSection(name) {
  state.currentSection = name;
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  const target = document.getElementById(`section-${name}`);
  if (target) target.classList.add("active");

  switch (name) {
    case "bank":
      // renderQuestionBank(); (called from showSection)
      break;
    case "exam":
      renderExamSection();
      break;
    case "wrong":
      renderWrongAnswers();
      break;
  }
}

// ============ Sidebar toggle (mobile) ============
function toggleSidebar(open) {
  document.querySelector(".sidebar").classList.toggle("open", open);
  document.querySelector(".sidebar-overlay").classList.toggle("open", open);
}

// ============ Subject Tabs ============
function initSubjectTabs() {
  document.querySelectorAll(".subject-tab").forEach(el => {
    el.addEventListener("click", () => {
      state.currentSubject = el.dataset.subject;
      state.currentQuestionIdx = 0;
      document.querySelectorAll(".subject-tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      // renderQuestionBank(); (called from showSection)
    });
  });
}

// ============ Filtered Questions ============
function getFilteredQuestions() {
  if (state.currentSubject === "all") return QUESTIONS;
  return QUESTIONS.filter(q => q.subject === state.currentSubject);
}

// ============ Question Bank ============
function renderQuestionBank() {
  const container = document.getElementById("qbank-container");
  const filtered = getFilteredQuestions();
  if (filtered.length === 0) {
    container.innerHTML = `<div class="wrong-empty"><div class="big-icon">📚</div><p>该科目暂无题目</p></div>`;
    return;
  }
  const idx = Math.min(state.currentQuestionIdx, filtered.length - 1);
  const q = filtered[idx];
  if (!q) return;

  document.getElementById("qbank-counter").textContent =
    `第 ${idx + 1} / ${filtered.length} 题（${q.subject}）`;

  let dotsHtml = "";
  filtered.forEach((fq, i) => {
    let cls = "q-dot";
    if (i === idx) cls += " current";
    const ans = state.answeredQuestions[fq.id];
    if (ans !== undefined) cls += " answered";
    dotsHtml += `<div class="${cls}" data-idx="${i}">${i + 1}</div>`;
  });
  document.getElementById("qbank-dots").innerHTML = dotsHtml;
  document.querySelectorAll("#qbank-dots .q-dot").forEach(el => {
    el.addEventListener("click", () => {
      state.currentQuestionIdx = parseInt(el.dataset.idx);
      // renderQuestionBank(); (called from showSection)
    });
  });

  const selected = state.answeredQuestions[q.id];
  renderQuestion(q, selected, "qbank-question", (qId, optIdx) => {
    state.answeredQuestions[qId] = optIdx;
    const isCorrect = optIdx === q.answer;
    if (!isCorrect) {
      addWrongAnswer(qId, optIdx);
    } else {
      // If user previously got it wrong but now correct, remove from wrong
      removeWrongAnswer(qId);
    }
    // renderQuestionBank(); (called from showSection)
    updateProgress();
    updateWrongBadge();
  });

  document.getElementById("qbank-prev").onclick = () => {
    if (idx > 0) { state.currentQuestionIdx = idx - 1; renderQuestionBank(); }
  };
  document.getElementById("qbank-next").onclick = () => {
    if (idx < filtered.length - 1) { state.currentQuestionIdx = idx + 1; renderQuestionBank(); }
  };
  document.getElementById("qbank-prev").disabled = idx === 0;
  document.getElementById("qbank-next").disabled = idx === filtered.length - 1;
}

function renderQuestion(q, selectedIdx, containerId, onSelect) {
  const container = document.getElementById(containerId);
  const answered = selectedIdx !== undefined;
  const correct = answered && selectedIdx === q.answer;

  let optionsHtml = q.options.map((opt, i) => {
    let cls = "option";
    if (answered) cls += " disabled";
    if (answered && i === selectedIdx) {
      cls += correct ? " correct" : " wrong";
    }
    if (answered && i === q.answer && i !== selectedIdx) {
      cls += " correct";
    }
    return `<div class="${cls}" data-optidx="${i}">
      <span class="opt-letter">${String.fromCharCode(65 + i)}</span>
      <span>${opt}</span>
    </div>`;
  }).join("");

  let feedbackHtml = "";
  if (answered) {
    const status = correct ? "correct" : "wrong";
    const statusText = correct ? "✓ 回答正确！" : "✗ 回答错误";
    feedbackHtml = `<div class="feedback-box ${status}">
      <div class="exp-label">${statusText}</div>
      <div class="exp-text">${q.exp}</div>
    </div>`;
  }

  container.innerHTML = `
    <div class="question-subject">${q.subject}</div>
    <div class="question-text">${q.q}</div>
    <div class="options">${optionsHtml}</div>
    ${feedbackHtml}
  `;

  if (!answered) {
    container.querySelectorAll(".option").forEach(el => {
      el.addEventListener("click", () => {
        const idx = parseInt(el.dataset.optidx);
        onSelect(q.id, idx);
      });
    });
  }
}

// ============ Wrong Answers ============
function loadWrongAnswers() {
  try {
    const data = localStorage.getItem("fakao_wrong");
    state.wrongAnswers = data ? JSON.parse(data) : [];
  } catch { state.wrongAnswers = []; }
}

function saveWrongAnswers() {
  localStorage.setItem("fakao_wrong", JSON.stringify(state.wrongAnswers));
}

function addWrongAnswer(qId, selectedIdx) {
  const existing = state.wrongAnswers.find(w => w.qId === qId);
  if (existing) {
    existing.selectedIdx = selectedIdx;
    existing.timestamp = Date.now();
  } else {
    state.wrongAnswers.push({ qId, selectedIdx, timestamp: Date.now() });
  }
  saveWrongAnswers();
}

function removeWrongAnswer(qId) {
  const before = state.wrongAnswers.length;
  state.wrongAnswers = state.wrongAnswers.filter(w => w.qId !== qId);
  if (state.wrongAnswers.length !== before) saveWrongAnswers();
}

function updateWrongBadge() {
  const badge = document.getElementById("wrong-badge");
  if (badge) {
    badge.textContent = state.wrongAnswers.length;
    badge.style.display = state.wrongAnswers.length > 0 ? "inline" : "none";
  }
}

function updateProgress() {
  const answered = Object.keys(state.answeredQuestions).length;
  const total = QUESTIONS.length;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  document.getElementById("progress-pct").textContent = `${pct}%`;
  document.getElementById("progress-fill").style.width = `${pct}%`;
  document.getElementById("progress-label").textContent = `${answered} / ${total}`;
}

function renderWrongAnswers() {
  const container = document.getElementById("wrong-container");
  if (state.wrongAnswers.length === 0) {
    container.innerHTML = `<div class="wrong-empty"><div class="big-icon">🎉</div><p>暂无错题记录，继续保持！</p></div>`;
    return;
  }

  // Build summary: group wrong answers by code
  const byCode = {};
  state.wrongAnswers.forEach(w => {
    const q = QUESTIONS.find(qq => qq.id === w.qId);
    if (!q) return;
    const code = q.code || q.subject;
    if (!byCode[code]) byCode[code] = { count: 0, topics: {} };
    byCode[code].count++;
    const topic = q.topic || "综合";
    if (!byCode[code].topics[topic]) byCode[code].topics[topic] = 0;
    byCode[code].topics[topic]++;
  });

  // Summary HTML
  let summaryHtml = `<div class="wrong-summary">
    <h3>📊 薄弱知识点概览</h3>
    <div class="summary-grid">`;
  const sortedCodes = Object.entries(byCode).sort((a, b) => b[1].count - a[1].count);
  sortedCodes.forEach(([code, data]) => {
    const topicsList = Object.entries(data.topics)
      .sort((a, b) => b[1] - a[1])
      .map(([t, c]) => `<span class="topic-tag">${t}（${c}题）</span>`)
      .join(" ");
    summaryHtml += `<div class="summary-card">
      <div class="sc-head">
        <span class="sc-code">${code}</span>
        <span class="sc-count">${data.count} 道错题</span>
      </div>
      <div class="sc-topics">${topicsList}</div>
    </div>`;
  });
  summaryHtml += `<div class="summary-card tip-card">
    <div class="sc-head"><span>💡 复习建议</span></div>
    <div class="sc-topics" style="color:var(--gray-500);font-size:.82rem;line-height:1.6;">
      错题数量最多的法典是你的薄弱环节。建议优先复习排名靠前的法典，重点突破高频错题对应的知识点后再回刷。
    </div>
  </div>`;
  summaryHtml += `</div></div>`;

  // Filter tabs by code
  let filterHtml = `<div class="wrong-filters">`;
  filterHtml += `<button class="wrong-filter active" data-wcode="all" onclick="filterWrong('all')">全部</button>`;
  sortedCodes.forEach(([code]) => {
    filterHtml += `<button class="wrong-filter" data-wcode="${code}" onclick="filterWrong('${code}')">${code}</button>`;
  });
  filterHtml += `</div>`;

  // Items list
  const filteredCode = state.wrongFilter || "all";
  const items = state.wrongAnswers
    .filter(w => {
      if (filteredCode === "all") return true;
      const q = QUESTIONS.find(qq => qq.id === w.qId);
      return q && (q.code === filteredCode || q.subject === filteredCode);
    })
    .map(w => {
      const q = QUESTIONS.find(qq => qq.id === w.qId);
      if (!q) return "";
      const selectedLetter = String.fromCharCode(65 + w.selectedIdx);
      const correctLetter = String.fromCharCode(65 + q.answer);
      return `<div class="wrong-item">
        <div class="wi-meta">
          <span class="wi-code">${q.code || q.subject}</span>
          <span class="wi-topic">${q.topic || "综合"}</span>
          <span class="wi-subject">${q.subject}</span>
        </div>
        <div class="wi-question">${q.q}</div>
        <div class="wi-answers">
          <span class="wrong-ans">你的答案：${selectedLetter}. ${q.options[w.selectedIdx]}</span>
          <span class="right-ans">正确答案：${correctLetter}. ${q.options[q.answer]}</span>
        </div>
        <div class="wi-explain">${q.exp}</div>
      </div>`;
    }).filter(Boolean).join("");

  container.innerHTML = summaryHtml + filterHtml + items + `<div style="text-align:center;margin-top:16px;">
    <button class="btn btn-danger-outline" onclick="clearWrongAnswers()">清空错题记录</button>
  </div>`;
}

function filterWrong(code) {
  state.wrongFilter = code;
  document.querySelectorAll(".wrong-filter").forEach(el => {
    el.classList.toggle("active", el.dataset.wcode === code);
  });
  renderWrongAnswers();
}

function clearWrongAnswers() {
  if (confirm("确定要清空所有错题记录吗？")) {
    state.wrongAnswers = [];
    saveWrongAnswers();
    updateWrongBadge();
    renderWrongAnswers();
  }
}

// ============ Mock Exam ============
function renderExamSection() {
  const container = document.getElementById("exam-container");

  if (!state.examState || state.examState.finished) {
    // Show start screen
    container.innerHTML = `
      <div class="exam-start">
        <h2>📝 模拟考试</h2>
        <p>随机抽取 20 道题目，限时 60 分钟</p>
        <div class="rules">
          <li>题目涵盖所有法考科目</li>
          <li>每题选择一个答案后不可更改</li>
          <li>60 分钟倒计时，超时自动交卷</li>
          <li>交卷后显示成绩和解析</li>
        </div>
        <button class="btn btn-primary" onclick="startExam()" style="font-size:1rem;padding:12px 36px;">
          开始考试
        </button>
      </div>
    `;
    return;
  }

  // Exam in progress
  renderExamActive();
}

function startExam() {
  // Pick 20 random questions
  const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, 20);
  state.examState = {
    questions: selected,
    answers: {},
    currentIdx: 0,
    timeLeft: 60 * 60,
    finished: false,
  };
  renderExamActive();
  startExamTimer();
}

function startExamTimer() {
  if (state.examState.timerId) clearInterval(state.examState.timerId);
  state.examState.timerId = setInterval(() => {
    state.examState.timeLeft--;
    updateExamTimer();
    if (state.examState.timeLeft <= 0) {
      finishExam();
    }
  }, 1000);
}

function updateExamTimer() {
  const t = state.examState.timeLeft;
  const min = Math.floor(t / 60);
  const sec = t % 60;
  const el = document.getElementById("exam-timer-display");
  if (el) {
    el.textContent = `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    el.parentElement.className = "exam-timer" + (t <= 300 ? " danger" : t <= 600 ? " warning" : "");
  }
}

function renderExamActive() {
  const es = state.examState;
  if (!es) return;
  const container = document.getElementById("exam-container");
  const q = es.questions[es.currentIdx];

  let paletteHtml = es.questions.map((qq, i) => {
    let cls = "palette-dot";
    if (i === es.currentIdx) cls += " current";
    if (es.answers[qq.id] !== undefined) cls += " answered";
    return `<div class="${cls}" data-exmidx="${i}">${i + 1}</div>`;
  }).join("");

  container.innerHTML = `
    <div class="exam-header">
      <div class="exam-progress-text">第 ${es.currentIdx + 1} / ${es.questions.length} 题</div>
      <div class="exam-timer">
        <span>⏱</span>
        <span id="exam-timer-display">60:00</span>
      </div>
      <button class="btn btn-danger-outline btn-sm" onclick="confirmFinishExam()">交卷</button>
    </div>
    <div class="exam-body">
      <div class="exam-main">
        <div id="exam-question"></div>
        <div class="exam-actions">
          <button class="btn btn-outline btn-sm" id="exam-prev" ${es.currentIdx === 0 ? "disabled" : ""}>上一题</button>
          <button class="btn btn-outline btn-sm" id="exam-next" ${es.currentIdx === es.questions.length - 1 ? "disabled" : ""}>下一题</button>
        </div>
      </div>
      <div class="exam-palette">
        <h4>答题卡</h4>
        <div class="palette-dots">${paletteHtml}</div>
        <div style="margin-top: 10px; font-size: .72rem; color: var(--gray-400);">
          <span style="display:inline-block;width:12px;height:12px;background:var(--primary);border-radius:50%;vertical-align:middle;margin-right:4px;"></span> 已答
          <span style="display:inline-block;width:12px;height:12px;background:var(--gray-100);border-radius:50%;vertical-align:middle;margin-right:4px;margin-left:8px;"></span> 未答
        </div>
      </div>
    </div>
  `;

  renderQuestion(q, es.answers[q.id], "exam-question", (qId, optIdx) => {
    if (es.answers[qId] === undefined) {
      es.answers[qId] = optIdx;
      renderExamActive();
    }
  });

  document.getElementById("exam-prev").onclick = () => {
    if (es.currentIdx > 0) { es.currentIdx--; renderExamActive(); }
  };
  document.getElementById("exam-next").onclick = () => {
    if (es.currentIdx < es.questions.length - 1) { es.currentIdx++; renderExamActive(); }
  };

  updateExamTimer();
}

function confirmFinishExam() {
  const es = state.examState;
  const answered = Object.keys(es.answers).length;
  if (answered < es.questions.length) {
    if (!confirm(`还有 ${es.questions.length - answered} 题未作答，确定要交卷吗？`)) return;
  } else {
    if (!confirm("所有题目已作答，确定要交卷吗？")) return;
  }
  finishExam();
}

function finishExam() {
  const es = state.examState;
  if (es.timerId) { clearInterval(es.timerId); es.timerId = null; }
  es.finished = true;

  let correct = 0;
  const details = es.questions.map(q => {
    const userAns = es.answers[q.id];
    const isCorrect = userAns !== undefined && userAns === q.answer;
    if (isCorrect) correct++;
    // Record wrong answers
    if (userAns !== undefined && !isCorrect) {
      addWrongAnswer(q.id, userAns);
    }
    if (userAns !== undefined && isCorrect) {
      removeWrongAnswer(q.id);
    }
    return { q, userAns, isCorrect };
  });
  updateWrongBadge();

  const total = es.questions.length;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 60;

  const container = document.getElementById("exam-container");
  container.innerHTML = `
    <div class="exam-result">
      <h2>${passed ? "🎉 恭喜通过！" : "💪 继续加油！"}</h2>
      <div class="score-circle ${passed ? "pass" : "fail"}">${pct}%</div>
      <div class="detail-row">
        <div class="detail-item"><div class="num">${correct}</div><div class="lbl">正确</div></div>
        <div class="detail-item"><div class="num">${total - correct}</div><div class="lbl">错误</div></div>
        <div class="detail-item"><div class="num">${total}</div><div class="lbl">总分</div></div>
      </div>
      <button class="btn btn-primary" onclick="showExamReview()">查看详细解析</button>
      <button class="btn btn-outline" onclick="resetExam()" style="margin-left:8px;">重新考试</button>
    </div>
    <div id="exam-review" style="display:none;margin-top:20px;"></div>
  `;
  updateProgress();

  // Store review data
  state.examReview = details;
}

function showExamReview() {
  const details = state.examReview;
  if (!details) return;
  const container = document.getElementById("exam-review");
  container.style.display = "block";

  const html = details.map((d, i) => {
    const q = d.q;
    const answered = d.userAns !== undefined;
    const correct = d.isCorrect;
    let optionsHtml = q.options.map((opt, j) => {
      let cls = "option disabled";
      if (answered && j === d.userAns) cls += correct ? " correct" : " wrong";
      if (j === q.answer && j !== d.userAns) cls += " correct";
      return `<div class="${cls}"><span class="opt-letter">${String.fromCharCode(65 + j)}</span><span>${opt}</span></div>`;
    }).join("");
    const status = !answered ? "未作答" : correct ? "✓ 正确" : "✗ 错误";
    return `<div class="question-card">
      <div class="question-subject">${q.subject} · ${status}</div>
      <div class="question-text">${i + 1}. ${q.q}</div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback-box ${correct ? "correct" : "wrong"}">
        <div class="exp-text">${q.exp}</div>
      </div>
    </div>`;
  }).join("");
  container.innerHTML = html;
}

function resetExam() {
  if (state.examState && state.examState.timerId) {
    clearInterval(state.examState.timerId);
  }
  state.examState = null;
  state.examReview = null;
  renderExamSection();
}
